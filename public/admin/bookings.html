<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Бронирования | EcoGorniy Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#120f0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EcoGorniy">
  <link rel="manifest" href="/api/manifest.json">
  <link rel="icon" href="/api/icon.png">
  <link rel="apple-touch-icon" href="/api/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=13">
  <style>
    body { padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
    
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      padding: 16px 32px; border-bottom: 1px solid var(--line);
      background: rgba(18, 15, 13, 0.85); backdrop-filter: blur(24px);
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-brand { display: flex; align-items: center; gap: 16px; }
    .admin-brand h1 { font-size: 24px; text-transform: none; margin: 0; letter-spacing: 0; }
    
    .admin-layout {
      flex: 1; display: grid; grid-template-columns: 240px 1fr;
      max-width: 1440px; margin: 0 auto; width: 100%;
    }
    
    .admin-sidebar {
      border-right: 1px solid var(--line); padding: 32px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    
    .admin-menu-item {
      padding: 12px 16px; border-radius: 8px;
      color: var(--muted); font-weight: 600; font-size: 14px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
      text-decoration: none; display: block;
    }
    .admin-menu-item:hover { background: rgba(237, 228, 214, 0.05); color: var(--cream); }
    .admin-menu-item.active { background: rgba(95, 103, 73, 0.3); color: var(--gold); }
    
    .admin-content { padding: 32px; position: relative; }
    .admin-content-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: end; }
    .admin-content-header h2 { font-size: 42px; margin: 0; text-transform: none; letter-spacing: 0; }
    
    .table-container {
      background: rgba(237, 228, 214, 0.02);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid var(--line); font-size: 14px; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(237, 228, 214, 0.04); }

    .status-badge {
      display: inline-block; padding: 4px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .status-pending { background: rgba(255, 193, 7, 0.15); color: #ffca28; }
    .status-confirmed { background: rgba(76, 175, 80, 0.15); color: #81c784; }
    .status-cancelled { background: rgba(244, 67, 54, 0.15); color: #e57373; }

    .action-select {
      background: rgba(237, 228, 214, 0.05); border: 1px solid var(--line);
      color: var(--cream); padding: 6px 10px; border-radius: 6px; font-family: inherit;
      font-size: 13px; color-scheme: dark; cursor: pointer;
    }
    .action-select:focus { outline: none; border-color: var(--gold); }
    .action-select option { background: var(--bg-2); color: var(--cream); }

    .guest-info { display: flex; flex-direction: column; gap: 2px; }
    .guest-info small { color: var(--muted); font-size: 12px; }
  </style>
  <link rel="stylesheet" href="/css/admin-mobile.css?v=6">
  <script defer src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="noise"></div>
  <div id="toast-container" class="toast-container"></div>

  <header class="admin-header">
    <div class="admin-brand">
      <div class="brand-mark">E</div>
      <h1>Панель управления</h1>
    </div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <a href="/" class="btn btn-ghost" style="min-height: 36px; padding: 0 16px;" target="_blank">На сайт</a>
      <button id="logoutBtn" class="btn btn-ghost" style="min-height: 36px; padding: 0 16px; border-color: #5f6749;">Выйти</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminMenu">
      <a href="/admin/bookings.html" class="admin-menu-item active">Бронирования</a>
      <a href="/admin/chats.html" class="admin-menu-item">Чаты</a>
      <a href="/admin/cabins.html" class="admin-menu-item">Управление фондом</a>
      <a href="/admin/prices.html" class="admin-menu-item">Цены</a>
      <a href="/admin/crm.html" class="admin-menu-item">CRM (Клиенты)</a>
      <a href="/admin/analytics.html" class="admin-menu-item">Аналитика</a>
      <a href="/admin/mainpage.html" class="admin-menu-item">Главный экран</a>
      <a href="/admin/settings.html" class="admin-menu-item">Услуги / наполнение</a>
    </aside>
    
    <main class="admin-content">
      <div class="admin-content-header">
        <div>
          <h2>Бронирования</h2>
          <span style="color: var(--muted);">Все заявки на аренду объектов</span>
        </div>
      </div>
      
      <div class="table-container" style="overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch;">
        <table>
          <thead>
            <tr>
              <th>ID / ДАТА</th>
              <th>ГОСТЬ</th>
              <th>ОБЪЕКТ</th>
              <th>ЗАЕЗД - ВЫЕЗД</th>
              <th>СУММА</th>
              <th>СТАТУС</th>
              <th>ДЕЙСТВИЯ</th>
            </tr>
          </thead>
          <tbody id="bookingsTableBody">
            <tr>
              <td colspan="7" style="text-align: center; color: var(--muted); padding: 32px;">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Edit Booking Modal -->
  <div class="modal-overlay" id="editBookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="margin:0;">Редактировать бронирование</h3>
        <button class="btn-close" id="closeBookingModal" style="background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <div class="modal-body" style="padding: 20px; display: grid; gap: 16px;">
        <input type="hidden" id="editBookingId">
        
        <div class="form-group">
          <label>Имя гостя</label>
          <input type="text" id="editGuestName" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px;">
        </div>
        
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <label>Телефон</label>
            <input type="text" id="editGuestPhone" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px;">
          </div>
          <div>
            <label>Telegram</label>
            <input type="text" id="editGuestTelegram" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px;">
          </div>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <label>Заезд</label>
            <input type="date" id="editCheckIn" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px; color-scheme:dark;">
          </div>
          <div>
            <label>Выезд</label>
            <input type="date" id="editCheckOut" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px; color-scheme:dark;">
          </div>
        </div>
        
        <div class="form-group">
          <label>Сумма (₽)</label>
          <input type="number" id="editTotalPrice" style="width:100%; background:rgba(237, 228, 214, 0.05); border:1px solid var(--line); color:var(--cream); padding:10px; border-radius:8px;">
        </div>

      </div>
      <div class="modal-footer" style="padding: 16px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 12px;">
        <button class="btn btn-ghost" id="cancelBookingEdit" style="min-height:36px; padding:0 16px;">Отмена</button>
        <button class="btn btn-primary" id="saveBookingEdit" style="min-height:36px; padding:0 16px;">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin-bookings.js?v=2"></script>
  <script src="/js/pwa.js?v=3"></script>
  <script src="/js/admin-mobile.js?v=3"></script>
</body>
</html>
