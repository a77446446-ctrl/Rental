<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CRM | EcoGorniy Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#120f0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EcoGorniy">
  <link rel="manifest" href="/api/manifest.json">
  <link rel="icon" href="/api/icon.png">
  <link rel="apple-touch-icon" href="/api/icon.png">
  <link rel="stylesheet" href="/css/main.css?v=20260716">
  <style>
    body { padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
    
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      padding: 16px 32px; border-bottom: 1px solid var(--line);
      background: rgba(18, 15, 13, 0.85); backdrop-filter: blur(24px);
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-brand { display: flex; align-items: center; gap: 16px; }
    .admin-brand h1 { font-size: 24px; text-transform: none; margin: 0; letter-spacing: 0; }
    
    .admin-layout {
      flex: 1; display: grid; grid-template-columns: 240px 1fr;
      max-width: 1440px; margin: 0 auto; width: 100%;
    }
    
    .admin-sidebar {
      border-right: 1px solid var(--line); padding: 32px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    
    .admin-menu-item {
      padding: 12px 16px; border-radius: 8px;
      color: var(--muted); font-weight: 600; font-size: 14px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
      text-decoration: none; display: block;
    }
    .admin-menu-item:hover { background: rgba(237, 228, 214, 0.05); color: var(--cream); }
    .admin-menu-item.active { background: rgba(95, 103, 73, 0.3); color: var(--gold); }
    
    .admin-content { padding: 32px; position: relative; }
    .admin-content-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: end; }
    .admin-content-header h2 { font-size: 42px; margin: 0; text-transform: none; letter-spacing: 0; }
    
    .table-container {
      background: rgba(237, 228, 214, 0.02);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid var(--line); font-size: 14px; }
    .admin-table th { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
    .muted { color: rgba(237, 228, 214, 0.4); }
    .money { color: var(--gold); font-weight: 500; }
    @media (max-width: 900px) {
      th, td { padding: 10px 8px; font-size: 13px; }
      td div { font-size: 14px; }
    }
    tbody tr:hover { background: rgba(237, 228, 214, 0.04); }

    .notes-input {
      width: 100%; background: rgba(237, 228, 214, 0.05); border: 1px solid var(--line);
      color: var(--cream); padding: 8px 12px; border-radius: 6px; font-family: inherit;
      font-size: 13px; resize: vertical; min-height: 40px; color-scheme: dark;
    }
    .notes-input:focus { outline: none; border-color: var(--gold); background: rgba(237, 228, 214, 0.08); }
    
    .save-notes-btn {
      margin-top: 8px; padding: 6px 12px; font-size: 12px;
      background: rgba(95, 103, 73, 0.2); border: 1px solid var(--line);
      color: var(--cream); border-radius: 6px; cursor: pointer; transition: 0.2s;
    }
    .save-notes-btn:hover { background: rgba(95, 103, 73, 0.5); }
    .save-notes-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  </style>
  <link rel="stylesheet" href="/css/admin-responsive.css?v=20260716">
  <script defer src="/js/lucide.min.js"></script>
</head>
<body>
  <div class="noise"></div>
  <div id="toast-container" class="toast-container"></div>

  <header class="admin-header">
    <div class="admin-brand">
      <div class="brand-mark">E</div>
      <h1>Панель управления</h1>
    </div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <a href="/" class="btn btn-ghost" style="min-height: 36px; padding: 0 16px;" target="_blank">На сайт</a>
      <button id="logoutBtn" class="btn btn-ghost" style="min-height: 36px; padding: 0 16px; border-color: #5f6749;">Выйти</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminMenu">
      <a href="/admin/bookings.html" class="admin-menu-item">Бронирования</a>
      <a href="/admin/chats.html" class="admin-menu-item">Чаты</a>
      <a href="/admin/cabins.html" class="admin-menu-item">Управление объектами</a>
      <a href="/admin/prices.html" class="admin-menu-item">Цены</a>
      <a href="/admin/crm.html" class="admin-menu-item active">CRM (Клиенты)</a>
      <a href="/admin/analytics.html" class="admin-menu-item">Аналитика</a>
      <a href="/admin/mainpage.html" class="admin-menu-item">Главный экран</a>
      <a href="/admin/settings.html" class="admin-menu-item">Услуги / наполнение</a>
    </aside>
    
    <main class="admin-content">
      <div class="admin-content-header">
        <div>
          <h2>CRM / Гости</h2>
          <span style="color: var(--muted);">История бронирований, LTV и заметки по клиентам</span>
        </div>
      </div>
      
      <div class="table-container" style="overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch;">
        <table class="admin-table" style="min-width: 600px;">
          <thead>
            <tr>
              <th>Гость</th>
              <th>Контакты</th>
              <th>Брони</th>
              <th>LTV (Сумма)</th>
              <th style="width: 40%;">Заметки</th>
            </tr>
          </thead>
          <tbody id="crmTableBody">
            <tr>
              <td colspan="5" style="text-align: center; color: var(--muted); padding: 32px;">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/api.js?v=20260716"></script>
  <script src="/js/admin-crm.js?v=20260716"></script>
  <script src="/js/pwa.js?v=20260716"></script>
  <script src="/js/admin-mobile.js?v=20260716"></script>
</body>
</html>
