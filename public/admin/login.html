<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход в панель управления | EcoGorniy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#120f0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EcoGorniy">
  <link rel="manifest" href="/api/manifest.json">
  <link rel="icon" href="/api/icon.png">
  <link rel="apple-touch-icon" href="/api/icon.png">
  <link rel="stylesheet" href="/css/main.css?v=20260723-2">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .login-box {
      width: 100%; max-width: 420px; padding: 40px;
      border: 1px solid var(--line); border-radius: 12px;
      background: var(--panel); backdrop-filter: blur(24px);
      box-shadow: var(--shadow); text-align: center;
    }
    .login-box h1 { font-size: 42px; margin-bottom: 8px; text-transform: none; }
    .login-box p { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
    .login-form { display: grid; gap: 16px; text-align: left; }
    .login-form label { font-size: 12px; color: var(--muted-2); margin-bottom: 6px; display: block; }
    .login-form input { width: 100%; }
    .login-form .btn { margin-top: 12px; width: 100%; }
    .home-link {
      width: 100%; margin-top: 16px; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    .error-msg { color: #e76c6c; font-size: 13px; text-align: center; margin-bottom: 16px; display: none; }
  </style>
  <link rel="stylesheet" href="/css/admin-responsive.css?v=20260723-2">
  <script defer src="/js/lucide.min.js"></script>
</head>
<body>
  <div class="noise"></div>

  <div class="login-box">
    <h1>EcoGorniy</h1>
    <p>Панель управления</p>

    <div class="error-msg" id="errorMsg"></div>

    <form class="login-form" id="loginForm">
      <div>
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" class="input" placeholder="Введите логин" required autocomplete="username">
      </div>
      <div>
        <label for="password">Пароль</label>
        <input type="password" id="password" class="input" placeholder="••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Войти</button>
    </form>

    <a href="/" class="btn btn-ghost home-link">Вернуться на главную</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      
      btn.textContent = 'Вход...';
      btn.disabled = true;
      err.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const json = await res.json();
        if (json.success) {
          window.location.href = '/admin/bookings.html';
        } else {
          err.textContent = json.error || 'Ошибка входа';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Ошибка сети';
        err.style.display = 'block';
      } finally {
        btn.textContent = 'Войти';
        btn.disabled = false;
      }
    });
  </script>
  <script src="/js/pwa.js?v=20260723-2"></script>
  <script src="/js/admin-mobile.js?v=20260723-2"></script>
</body>
</html>
